<!DOCTYPE html>
<html>
<head>
    <title>Professional CV</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            color: #333;
            background-color: #f4f4f4;
            line-height: 1.6;
        }

        .header {
            background-color: #004488; /* A shade of blue */
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .section {
            background-color: #fff;
            margin: 20px auto;
            padding: 20px;
            width: 80%;
            box-shadow: 0 0 10px 0 rgba(0,0,0,0.1);
        }

        h1, h2 {
            color: #004488; /* Matching the header background */
        }

        ul {
            list-style-position: inside;
        }

        li {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>John Doe</h1>
        <p>Web Developer</p>
    </div>
    <div class="section" id="about-me">
        <h2>About Me</h2>
        <p>Detail-oriented web developer with 3+ years of experience...</p>
    </div>
    <div class="section" id="education">
        <h2>Education</h2>
        <ul>
            <li>BSc Computer Science - XYZ University (2017 - 2020)</li>
            <!-- More education entries here -->
        </ul>
    </div>
    <div class="section" id="experience">
        <h2>Work Experience</h2>
        <ul>
            <li>Senior Web Developer at ABC Corp (2021 - Present)</li>
            <!-- More experience entries here -->
        </ul>
    </div>
    <div class="section" id="skills">
        <h2>Skills</h2>
        <ul>
            <li>HTML, CSS, JavaScript</li>
            <!-- More skills here -->
        </ul>
    </div>
</body>
</html>
